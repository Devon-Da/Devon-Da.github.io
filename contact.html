<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact 代俊龙 · Devon</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --ink: #f5f1ea;
        --muted: rgba(245, 241, 234, 0.66);
        --panel: rgba(255, 255, 255, 0.06);
        --line: rgba(255, 255, 255, 0.14);
        --red: #8f1218;
        --wine: #2a0508;
        --button-a: #18011f;
        --button-b: #b600a8;
        --button-c: #7621b0;
        --button-d: #be4c00;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background:
          radial-gradient(circle at 72% 42%, rgba(143, 18, 24, 0.58), transparent 22rem),
          radial-gradient(circle at 12% 12%, rgba(255, 255, 255, 0.11), transparent 18rem),
          linear-gradient(135deg, #030303 0%, #111 46%, #050505 100%);
        color: var(--ink);
        font-family: Inter, "Microsoft YaHei", Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
      }

      body::before {
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
          linear-gradient(0deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 80px 80px;
        content: "";
        inset: 0;
        mask-image: linear-gradient(135deg, #000 0%, transparent 68%);
        opacity: 0.28;
        pointer-events: none;
        position: fixed;
      }

      .page {
        display: grid;
        min-height: 100vh;
        padding: clamp(1rem, 4vw, 3rem);
        place-items: center;
        position: relative;
      }

      .card {
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.025)),
          rgba(0, 0, 0, 0.72);
        border: 1px solid var(--line);
        border-radius: 30px;
        box-shadow:
          0 40px 120px rgba(0, 0, 0, 0.58),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        display: grid;
        gap: clamp(1.5rem, 4vw, 4rem);
        grid-template-columns: minmax(0, 1.08fr) minmax(280px, 0.75fr);
        max-width: 1180px;
        overflow: hidden;
        padding: clamp(1.25rem, 4vw, 3rem);
        position: relative;
        width: min(100%, 1180px);
      }

      .card::after {
        background: radial-gradient(circle, rgba(143, 18, 24, 0.72), transparent 68%);
        border-radius: 999px;
        content: "";
        height: 520px;
        position: absolute;
        right: -120px;
        top: 7%;
        width: 520px;
        z-index: 0;
      }

      .content,
      .portrait-wrap {
        position: relative;
        z-index: 1;
      }

      .eyebrow {
        color: var(--muted);
        font-size: 0.78rem;
        letter-spacing: 0.28em;
        margin: 0 0 0.75rem;
        text-transform: uppercase;
      }

      h1 {
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(3.5rem, 10vw, 8.6rem);
        font-weight: 500;
        letter-spacing: 0;
        line-height: 0.82;
        margin: 0;
      }

      .intro {
        background: rgba(0, 0, 0, 0.46);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        color: rgba(245, 241, 234, 0.82);
        font-size: clamp(1.04rem, 1.3vw, 1.22rem);
        line-height: 1.75;
        margin: clamp(1.25rem, 4vw, 2.25rem) 0;
        max-width: 40rem;
        padding: 1.25rem 1.4rem;
      }

      .contact-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        max-width: 40rem;
      }

      .contact-tile {
        background:
          linear-gradient(145deg, rgba(143, 18, 24, 0.24), transparent),
          var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        color: inherit;
        display: block;
        min-height: 122px;
        overflow: hidden;
        padding: 1rem;
        text-decoration: none;
      }

      .contact-tile strong {
        display: block;
        font-size: clamp(1rem, 2.1vw, 1.48rem);
        font-weight: 700;
        letter-spacing: 0;
        line-height: 1;
        white-space: nowrap;
      }

      .contact-tile span {
        color: var(--muted);
        display: block;
        font-size: clamp(0.82rem, 1.2vw, 0.98rem);
        letter-spacing: 0.08em;
        margin-top: 0.75rem;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .back-link {
        background: linear-gradient(
          123deg,
          var(--button-a) 7%,
          var(--button-b) 37%,
          var(--button-c) 72%,
          var(--button-d) 100%
        );
        border: 0;
        border-radius: 999px;
        box-shadow:
          0 4px 4px rgba(181, 1, 167, 0.25),
          4px 4px 12px #7721b1 inset;
        color: #fff;
        display: inline-flex;
        font-size: 0.78rem;
        letter-spacing: 0.16em;
        margin-top: 1.25rem;
        outline: 2px solid #fff;
        outline-offset: -3px;
        padding: 0.8rem 1.1rem;
        text-decoration: none;
        text-transform: uppercase;
        transition:
          filter 200ms ease,
          transform 200ms ease;
      }

      .back-link:hover {
        filter: brightness(1.08);
        transform: translateY(-1px);
      }

      .portrait-wrap {
        align-self: center;
        align-items: center;
        display: flex;
        flex-direction: column;
        justify-self: center;
      }

      .portrait-orbit {
        aspect-ratio: 1;
        background: radial-gradient(circle at 45% 35%, #3b070a, #130101 72%);
        border-radius: 999px;
        box-shadow:
          0 30px 80px rgba(0, 0, 0, 0.5),
          inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        display: grid;
        max-width: 350px;
        overflow: hidden;
        padding: 0;
        place-items: center;
        width: min(30vw, 350px);
      }

      .portrait-orbit img {
        border-radius: 999px;
        filter: grayscale(0.2) contrast(1.04);
        height: 100%;
        object-fit: cover;
        object-position: 70% 44%;
        transform: scale(1.2) translateX(-6%);
        transform-origin: center;
        width: 100%;
      }

      .wechat-qr {
        align-items: center;
        display: flex;
        flex-direction: column;
        margin-top: clamp(1.2rem, 2.8vw, 1.7rem);
      }

      .wechat-qr img {
        border-radius: 18px;
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.36);
        width: min(40vw, 182px);
      }

      .wechat-qr span {
        color: rgba(245, 241, 234, 0.84);
        font-size: clamp(0.95rem, 1.45vw, 1.18rem);
        font-weight: 500;
        letter-spacing: 0.16em;
        margin-top: 0.75rem;
      }

      @media (max-width: 860px) {
        .card {
          grid-template-columns: 1fr;
        }

        .card::after {
          height: 320px;
          right: -90px;
          top: 22%;
          width: 320px;
        }

        .portrait-orbit {
          width: min(66vw, 340px);
        }
      }

      @media (max-width: 560px) {
        .contact-grid {
          grid-template-columns: 1fr;
        }

        .card {
          border-radius: 22px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card" aria-label="Contact 代俊龙 Devon">
        <div class="content">
          <p class="eyebrow">Interior Design / 3D Visualization</p>
          <h1>Contact</h1>
          <p class="intro">
            世间景致的动人程度，藏于每一处细腻细节里。于室内创作中捕捉光影、材质与尺度的细微变化，以敏锐感知雕琢有温度、藏诗意的人居空间。
          </p>
          <div class="contact-grid" aria-label="Contact options">
            <div class="contact-tile">
              <strong>代俊龙&thinsp;·&thinsp;DEVON</strong>
              <span>设计师 Designer</span>
            </div>
            <div class="contact-tile">
              <strong>18190969265</strong>
              <span>Phone</span>
            </div>
            <div class="contact-tile">
              <strong>545963039@qq.com</strong>
              <span>Email</span>
            </div>
            <div class="contact-tile">
              <strong>四川&thinsp;·&thinsp;成都&thinsp;·&thinsp;崇州</strong>
              <span>Location</span>
            </div>
          </div>
          <a class="back-link" id="backLink" href="/jack-3d-creator-static.html">Back to portfolio</a>
        </div>
        <div class="portrait-wrap">
          <div class="portrait-orbit">
            <img src="asset--contact-portrait.jpg" alt="Devon portrait" />
          </div>
          <div class="wechat-qr">
            <img src="asset--wechat-qr-white.png" alt="个人微信二维码" />
            <span>个人微信</span>
          </div>
        </div>
      </section>
    </main>
    <script>
      const backLink = document.querySelector("#backLink");
      if (new URLSearchParams(window.location.search).get("return") === "about") {
        backLink.href = "/jack-3d-creator-static.html#about";
      }
    </script>
  </body>
</html>
