    <title>jolin bds revised | 项目合集</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070707;
        --card: rgba(255, 255, 255, 0.06);
        --line: rgba(255, 255, 255, 0.14);
        --text: #f4f1ea;
        --muted: rgba(244, 241, 234, 0.62);
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: Inter, "Microsoft YaHei", Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
      }

      header {
        align-items: end;
        border-bottom: 1px solid var(--line);
        display: flex;
        gap: 1rem;
        justify-content: space-between;
        padding: clamp(1.25rem, 4vw, 3rem);
      }

      h1 {
        font-size: clamp(2.25rem, 7vw, 6.5rem);
        letter-spacing: 0;
        line-height: 0.92;
        margin: 0;
        text-transform: uppercase;
      }

      header > div {
        min-width: 0;
      }

      header p {
        color: var(--muted);
        font-size: clamp(1rem, 1.8vw, 1.15rem);
        line-height: 1.7;
        margin: 0;
        max-width: 100%;
        overflow-x: auto;
        white-space: nowrap;
      }

      main {
        columns: 3 320px;
        column-gap: 1rem;
        padding: 1rem;
      }

      figure {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        break-inside: avoid;
        margin: 0 0 1rem;
        overflow: hidden;
      }

      img {
        display: block;
        height: auto;
        width: 100%;
      }

      figcaption {
        color: var(--muted);
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        padding: 0.75rem 0.9rem;
        text-transform: uppercase;
      }

      a {
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--text);
        flex-shrink: 0;
        padding: 0.75rem 1rem;
        text-decoration: none;
        text-transform: uppercase;
      }

      @media (max-width: 720px) {
        header {
          align-items: start;
          flex-direction: column;
        }

        main {
          columns: 1;
        }
      }
    </style>
  </head>
